# FIX Trading Configuration for NYSE
# Replace with your actual credentials and connection details

# Your company identifier (provided by NYSE)
fix.senderCompID=YOUR_FIRM_ID

# NYSE target identifier
fix.targetCompID=NYSE

# NYSE FIX gateway connection details
# Production
fix.host=fix-gateway.nyse.com
fix.port=9876

# Test/UAT environment (use for testing)
# fix.host=fix-uat.nyse.com
# fix.port=9876

# FIX version (NYSE typically uses FIX 4.4)
fix.version=FIX.4.4

# Heartbeat interval in seconds
fix.heartbeatInterval=30

# Reset sequence numbers on logon
# true = start from 1 each session
# false = maintain sequence across sessions
fix.resetSeqNum=true

# Authentication credentials (if required)
fix.username=your_username
fix.password=your_password

# Trading session identifier
# REGULAR = normal market hours
# PRE_MARKET = pre-market trading
# POST_MARKET = after-hours trading
fix.tradingSessionID=REGULAR

# On behalf of company ID (optional, for routing)
fix.onBehalfOfCompID=
